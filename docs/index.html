<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFE — The Fixed-Point Journey</title>
<style>
/* ── wireframe reset ─────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0c;--fg:#c8c8d0;--accent:#7eb8da;
  --dim:#555;--grid:#181820;--mono:'Courier New',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--fg);font-family:var(--mono);font-size:14px}

/* ── layout ──────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh}
#topbar{display:flex;align-items:center;justify-content:space-between;
  padding:6px 16px;border-bottom:1px solid var(--grid);font-size:12px}
#topbar .title{color:var(--accent);font-weight:bold;letter-spacing:2px}
#topbar .modes{display:flex;gap:4px}
#topbar .modes button{
  background:none;border:1px solid var(--dim);color:var(--dim);
  padding:2px 8px;font-family:var(--mono);font-size:11px;cursor:pointer;
  transition:all .15s}
#topbar .modes button:hover,#topbar .modes button.active{
  border-color:var(--accent);color:var(--accent)}
#phase-bar{display:flex;padding:4px 16px;gap:2px;border-bottom:1px solid var(--grid)}
.phase-pip{flex:1;height:4px;background:var(--grid);transition:background .4s}
.phase-pip.reached{background:var(--accent)}
.phase-pip.current{background:var(--fg)}
#stage{flex:1;position:relative;overflow:hidden}
#hud{position:absolute;top:8px;right:16px;font-size:11px;color:var(--dim);text-align:right;z-index:10;pointer-events:none}
#footer{padding:4px 16px;border-top:1px solid var(--grid);font-size:10px;color:var(--dim);
  display:flex;justify-content:space-between}

/* ── typewriter mode ─────────────────────────────────────── */
#typewriter{display:none;flex-direction:column;height:100%;padding:24px 10%}
#tw-display{flex:1;overflow-y:auto;line-height:1.8;font-size:15px;white-space:pre-wrap}
#tw-display .done{color:var(--accent)}
#tw-display .cursor-char{background:var(--accent);color:var(--bg)}
#tw-display .pending{color:var(--dim)}
#tw-display .wrong{color:#e55;background:#300}
#tw-input{position:absolute;opacity:0;width:0;height:0}
#tw-stats{padding:8px 0;font-size:12px;color:var(--dim);border-top:1px solid var(--grid)}

/* ── surfer mode ─────────────────────────────────────────── */
#surfer{display:none;height:100%;position:relative}
#surfer-canvas{width:100%;height:100%}

/* ── reader mode (press-to-continue + plant) ─────────────── */
#reader{display:none;flex-direction:column;height:100%;padding:24px}
#reader-plant{height:120px;display:flex;align-items:flex-end;justify-content:center;
  border-bottom:1px solid var(--grid);margin-bottom:16px}
#reader-text{flex:1;overflow-y:auto;line-height:1.9;font-size:15px;padding:0 10%}
#reader-text .phase-title{color:var(--accent);font-size:18px;margin-bottom:12px;display:block}
#reader-text .eq{color:var(--fg);font-size:16px;letter-spacing:1px;display:block;
  text-align:center;margin:12px 0;padding:8px;border:1px solid var(--grid)}
#reader-prompt{text-align:center;padding:12px;color:var(--dim);font-size:12px}
#reader-choices{display:flex;justify-content:center;gap:8px;padding:8px}
#reader-choices button{
  background:none;border:1px solid var(--dim);color:var(--fg);
  padding:6px 16px;font-family:var(--mono);font-size:12px;cursor:pointer}
#reader-choices button:hover{border-color:var(--accent);color:var(--accent)}

/* ── puzzle mode ─────────────────────────────────────────── */
#puzzle{display:none;flex-direction:column;height:100%;padding:24px}
#puzzle-grid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.puzzle-card{
  border:1px solid var(--dim);padding:16px 24px;max-width:600px;width:100%;
  cursor:pointer;transition:all .3s}
.puzzle-card:hover{border-color:var(--accent)}
.puzzle-card.dissolved{border-color:#484;color:#6a6;opacity:.6}
.puzzle-card .assumption{font-size:13px;color:var(--fg)}
.puzzle-card .challenge{font-size:11px;color:var(--dim);margin-top:8px;display:none}
.puzzle-card.revealed .challenge{display:block}
.puzzle-card.dissolved .challenge{color:#6a6}
#puzzle-status{text-align:center;padding:8px;font-size:12px;color:var(--dim)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="title">RFE ⊢ x = f(x) → G<sub>μν</sub></span>
    <div class="modes">
      <button onclick="setMode('typewriter')" id="btn-typewriter">1 TYPE</button>
      <button onclick="setMode('surfer')" id="btn-surfer">2 SURF</button>
      <button onclick="setMode('reader')" id="btn-reader">3 READ</button>
      <button onclick="setMode('puzzle')" id="btn-puzzle">4 PUZZLE</button>
    </div>
  </div>
  <div id="phase-bar"></div>
  <div id="stage">
    <div id="hud"></div>
    <div id="typewriter"></div>
    <div id="surfer"><canvas id="surfer-canvas"></canvas></div>
    <div id="reader"></div>
    <div id="puzzle"></div>
  </div>
  <div id="footer">
    <span id="footer-phase">Phase 1/7</span>
    <span>nickjoven/rfe · CC0</span>
    <span id="footer-mode">MODE: —</span>
  </div>
</div>

<script src="content.js"></script>
<script src="engine.js"></script>
</body>
</html>
