<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFE — The Fixed-Point Journey</title>
<style>
/* ── wireframe reset ─────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0c;--fg:#d8d8e0;--accent:#5ef0ff;
  --dim:#777;--grid:#1c1c28;--mono:'Courier New',monospace;
  --radius:0px;--err:#ff4466;--err-bg:#400018;
  --ok:#44ffaa;--ok-dim:#1a6644;
  --glow:0 0 6px var(--accent);
}

/* ── aesthetic: space ──────────────────────────────────── */
[data-aesthetic="space"]{
  --bg:#06060e;--fg:#c8d0f0;--accent:#44ddff;
  --dim:#5566aa;--grid:#101028;
  --err:#ff3366;--err-bg:#300028;
  --ok:#33ffcc;--ok-dim:#1a5544;
  --glow:0 0 12px var(--accent), 0 0 30px rgba(68,221,255,.15);
}
[data-aesthetic="space"] body{
  background:radial-gradient(ellipse at 50% 0%,#0a0a2a 0%,#06060e 60%) fixed}
[data-aesthetic="space"] .phase-pip.reached{box-shadow:0 0 4px var(--accent)}
[data-aesthetic="space"] #topbar .title{text-shadow:0 0 8px var(--accent)}

/* ── aesthetic: bit-limited ────────────────────────────── */
[data-aesthetic="bit"]{
  --bg:#0c0c0c;--fg:#33ff66;--accent:#33ff66;
  --dim:#1a7733;--grid:#0a2a0a;
  --mono:'Courier New',monospace;
  --err:#ff3333;--err-bg:#330000;
  --ok:#33ff66;--ok-dim:#0a3a0a;
  --glow:0 0 4px #33ff66;
}
[data-aesthetic="bit"] *{border-radius:0 !important}
[data-aesthetic="bit"] body{image-rendering:pixelated}

/* ── aesthetic: minimal ────────────────────────────────── */
[data-aesthetic="minimal"]{
  --bg:#0e0e10;--fg:#eee;--accent:#fff;
  --dim:#555;--grid:#1a1a1c;
  --err:#ff6666;--err-bg:#2a0000;
  --ok:#aaffcc;--ok-dim:#224422;
  --glow:none;
}
[data-aesthetic="minimal"] #topbar .modes button{border-width:0;border-bottom:1px solid var(--dim)}
[data-aesthetic="minimal"] #topbar .modes button.active{border-color:var(--accent)}
[data-aesthetic="minimal"] .puzzle-card{border-width:0;border-left:2px solid var(--dim)}
[data-aesthetic="minimal"] .puzzle-card:hover{border-color:var(--accent)}

/* ── aesthetic: curved ─────────────────────────────────── */
[data-aesthetic="curved"]{
  --bg:#0d0d14;--fg:#ddd8f0;--accent:#c4a0ff;
  --dim:#6655aa;--grid:#1a1828;--radius:12px;
  --err:#ff6699;--err-bg:#30002a;
  --ok:#88ffcc;--ok-dim:#1a4433;
  --glow:0 0 10px rgba(196,160,255,.25);
}
[data-aesthetic="curved"] #topbar .modes button{border-radius:20px;padding:2px 12px}
[data-aesthetic="curved"] .puzzle-card{border-radius:var(--radius)}
[data-aesthetic="curved"] .phase-pip{border-radius:2px}

/* ── aesthetic: negative ───────────────────────────────── */
[data-aesthetic="negative"]{
  --bg:#f0efe8;--fg:#1a1a1e;--accent:#0055cc;
  --dim:#999;--grid:#d8d8d0;
  --err:#cc0000;--err-bg:#ffdddd;
  --ok:#007744;--ok-dim:#cceecc;
  --glow:none;
}
[data-aesthetic="negative"] #tw-display .cursor-char{background:var(--accent);color:#fff}

/* ── aesthetic: familiar ───────────────────────────────── */
[data-aesthetic="familiar"]{
  --bg:#1a1612;--fg:#e8dcc8;--accent:#ffaa44;
  --dim:#887755;--grid:#2a2218;
  --mono:Georgia,'Times New Roman',serif;
  --err:#ee5533;--err-bg:#3a1a0a;
  --ok:#88cc44;--ok-dim:#334422;
  --glow:0 0 8px rgba(255,170,68,.2);
}
[data-aesthetic="familiar"] body{font-family:var(--mono)}
[data-aesthetic="familiar"] #tw-display,
[data-aesthetic="familiar"] #reader-text{line-height:2;font-size:16px}

/* ── aesthetic: artemis (moon/geodesic) ────────────────── */
[data-aesthetic="artemis"]{
  --bg:#f0ede4;--fg:#1a2a33;--accent:#2a6878;
  --dim:#8a96a0;--grid:#c8d0d4;--radius:8px;
  --err:#cc3333;--err-bg:#ffdddd;
  --ok:#2a7a4a;--ok-dim:#cceecc;
  --glow:0 0 8px rgba(42,104,120,.15);
}
[data-aesthetic="artemis"] body{
  background:radial-gradient(ellipse at 25% 85%,#e4e0d8 0%,#f0ede4 50%) fixed}
[data-aesthetic="artemis"] #topbar .title{text-shadow:0 0 4px var(--accent)}
[data-aesthetic="artemis"] .phase-pip.reached{box-shadow:0 0 3px var(--accent)}
[data-aesthetic="artemis"] #tw-display .cursor-char{background:var(--accent);color:#fff}
[data-aesthetic="artemis"] #topbar .modes button{border-radius:20px;padding:2px 12px}
[data-aesthetic="artemis"] .puzzle-card{border-radius:var(--radius)}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--fg);
  font-family:var(--user-face, var(--mono));font-size:var(--user-size, 16px)}
#tw-display,#reader-text{font-size:var(--user-size, 16px)}
#reader-text .phase-title{font-size:calc(var(--user-size, 16px) + 3px)}

/* ── layout ──────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh}
#topbar{display:flex;align-items:center;justify-content:space-between;
  padding:6px 16px;border-bottom:1px solid var(--grid);font-size:12px}
#topbar .title{color:var(--accent);font-weight:bold;letter-spacing:2px}
#topbar .modes{display:flex;gap:4px}
#topbar .modes button{
  background:none;border:1px solid var(--dim);color:var(--dim);
  padding:2px 8px;font-family:var(--mono);font-size:11px;cursor:pointer;
  transition:all .15s;border-radius:var(--radius)}
#topbar .modes button:hover,#topbar .modes button.active{
  border-color:var(--accent);color:var(--accent);box-shadow:var(--glow)}
#topbar .modes button.locked{opacity:0.2;pointer-events:none}

/* ── aesthetic picker ───────────────────────────────────── */
/* ── settings bars (aesthetic, font, size) ──────────────── */
.settings-bar{display:flex;align-items:center;gap:4px;padding:2px 16px;
  border-bottom:1px solid var(--grid);font-size:10px;color:var(--dim);overflow-x:auto}
.settings-bar .bar-label{margin-right:4px;white-space:nowrap}
.settings-bar button{
  background:none;border:1px solid var(--grid);color:var(--dim);
  padding:1px 7px;font-family:var(--mono);font-size:10px;cursor:pointer;
  transition:all .15s;white-space:nowrap;border-radius:var(--radius)}
.settings-bar button:hover,.settings-bar button.active{
  border-color:var(--accent);color:var(--accent)}
#phase-bar{display:flex;padding:4px 16px;gap:2px;border-bottom:1px solid var(--grid)}
.phase-pip{flex:1;height:4px;background:var(--grid);transition:background .4s}
.phase-pip.reached{background:var(--accent)}
.phase-pip.current{background:var(--fg)}
#stage{flex:1;position:relative;overflow:hidden}
#hud{position:absolute;top:8px;right:16px;font-size:11px;color:var(--dim);text-align:right;z-index:10;pointer-events:none}
#footer{padding:4px 16px;border-top:1px solid var(--grid);font-size:10px;color:var(--dim);
  display:flex;justify-content:space-between}

/* ── typewriter mode ─────────────────────────────────────── */
#typewriter{display:none;flex-direction:column;height:100%;padding:24px 10%}
#tw-display{flex:1;overflow-y:auto;line-height:1.8;white-space:pre-wrap}
#tw-display .done{color:var(--accent)}
#tw-display .cursor-char{background:var(--accent);color:var(--bg)}
#tw-display .pending{color:var(--dim)}
#tw-display .wrong{color:var(--err);background:var(--err-bg)}
#tw-input{position:absolute;opacity:0;width:0;height:0}
#tw-stats{padding:8px 0;font-size:12px;color:var(--dim);border-top:1px solid var(--grid)}

/* ── bricks mode ─────────────────────────────────────────── */
#bricks{display:none;height:100%;position:relative}
#bricks-canvas{width:100%;height:100%}

/* ── archery mode ──────────────────────────────────────────── */
#archery{display:none;height:100%;position:relative}
#archery-canvas{width:100%;height:100%}

/* ── field mode ───────────────────────────────────────────── */
#field{display:none;height:100%;position:relative}
#field-canvas{width:100%;height:100%}

/* ── reader mode (press-to-continue + plant) ─────────────── */
#reader{display:none;flex-direction:column;height:100%;padding:24px}
#reader-plant{height:120px;display:flex;align-items:flex-end;justify-content:center;
  border-bottom:1px solid var(--grid);margin-bottom:16px}
#reader-text{flex:1;overflow-y:auto;line-height:1.9;padding:0 10%}
#reader-text .phase-title{color:var(--accent);margin-bottom:12px;display:block}
#reader-text .eq{color:var(--fg);font-size:16px;letter-spacing:1px;display:block;
  text-align:center;margin:12px 0;padding:8px;border:1px solid var(--grid)}
#reader-prompt{text-align:center;padding:12px;color:var(--dim);font-size:12px}
#reader-choices{display:flex;justify-content:center;gap:8px;padding:8px}
#reader-choices button{
  background:none;border:1px solid var(--dim);color:var(--fg);
  padding:6px 16px;font-family:var(--mono);font-size:12px;cursor:pointer}
#reader-choices button:hover{border-color:var(--accent);color:var(--accent)}

/* ── puzzle mode (equation audit) ───────────────────────── */
#puzzle{display:none;flex-direction:column;height:100%;padding:24px;overflow-y:auto}
#puzzle-grid{display:flex;flex-direction:column;align-items:center;gap:12px;padding-bottom:24px}
.puzzle-card{
  border:1px solid var(--dim);padding:12px 20px;max-width:640px;width:100%;
  transition:all .3s;border-radius:var(--radius)}
.puzzle-card:hover{border-color:var(--accent)}
.puzzle-card.dissolved{border-color:var(--ok-dim);opacity:.7}
.puzzle-term{transition:all .15s !important}
.puzzle-term:hover{box-shadow:var(--glow)}
.puzzle-term.wrong{text-decoration:line-through}
#puzzle-status{text-align:center;padding:8px 8px 16px;font-size:12px;color:var(--dim)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="title">RFE ⊢ x = f(x) → G<sub>μν</sub></span>
    <div class="modes">
      <button onclick="setMode('typewriter')" id="btn-typewriter">1 TYPE</button>
      <button onclick="setMode('bricks')" id="btn-bricks">2 BRICKS</button>
      <button onclick="setMode('reader')" id="btn-reader">3 READ</button>
      <button onclick="setMode('puzzle')" id="btn-puzzle">4 PUZZLE</button>
      <a href="rfe_journey.ipynb" style="border:1px solid var(--dim);color:var(--dim);padding:2px 8px;font-size:11px;text-decoration:none;display:inline-block" target="_blank">5 .ipynb</a>
      <button onclick="setMode('archery')" id="btn-archery" class="locked">6 ARTEMIS</button>
      <button onclick="setMode('field')" id="btn-field" class="locked">7 FIELD</button>
    </div>
  </div>
  <div id="aesthetic-bar" class="settings-bar">
    <span class="bar-label">◈</span>
    <button onclick="setAesthetic('')" class="active">wire</button>
    <button onclick="setAesthetic('space')">space</button>
    <button onclick="setAesthetic('bit')">bit</button>
    <button onclick="setAesthetic('minimal')">minimal</button>
    <button onclick="setAesthetic('curved')">curved</button>
    <button onclick="setAesthetic('negative')">negative</button>
    <button onclick="setAesthetic('familiar')">familiar</button>
    <button onclick="setAesthetic('artemis')">artemis</button>
    <span class="bar-label" style="margin-left:8px">Aa</span>
    <button onclick="setFontSize(12)">12</button>
    <button onclick="setFontSize(14)">14</button>
    <button onclick="setFontSize(16)" class="active" data-group="size">16</button>
    <button onclick="setFontSize(18)">18</button>
    <button onclick="setFontSize(22)">22</button>
  </div>
  <div id="font-bar" class="settings-bar">
    <span class="bar-label">font</span>
    <button onclick="setFontFace('')" class="active">default</button>
    <button onclick="setFontFace('Courier New')">Courier</button>
    <button onclick="setFontFace('Consolas')">Consolas</button>
    <button onclick="setFontFace('Monaco')">Monaco</button>
    <button onclick="setFontFace('Menlo')">Menlo</button>
    <button onclick="setFontFace('SF Mono')">SF Mono</button>
    <button onclick="setFontFace('Fira Code')">Fira Code</button>
    <button onclick="setFontFace('Source Code Pro')">Source Code Pro</button>
    <button onclick="setFontFace('JetBrains Mono')">JetBrains</button>
    <button onclick="setFontFace('IBM Plex Mono')">IBM Plex</button>
  </div>
  <div id="phase-bar"></div>
  <div id="stage">
    <div id="hud"></div>
    <div id="typewriter"></div>
    <div id="bricks"><canvas id="bricks-canvas"></canvas></div>
    <div id="reader"></div>
    <div id="puzzle"></div>
    <div id="archery"><canvas id="archery-canvas"></canvas></div>
    <div id="field"><canvas id="field-canvas"></canvas></div>
  </div>
  <div id="footer">
    <span id="footer-phase">Phase 1/7</span>
    <span>nickjoven/rfe · CC0</span>
    <span id="footer-mode">MODE: —</span>
  </div>
</div>

<script src="physics.js"></script>
<script src="content.js"></script>
<script src="engine.js"></script>
<script src="archery.js"></script>
<script src="field.js"></script>
</body>
</html>
